model:
  name: "llava-v1.5-7b"
  torch_dtype: "bfloat16"
  device_map: "auto"

icet:
  # Layers to probe for vulnerability demo
  probe_layers: [5, 10, 15, 18, 20, 23]
  # Total encoder layers in CLIP ViT-L/14
  total_layers: 24

data:
  # Number of prompts to test in demo
  num_demo_samples: 5

lppo:
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules: ["q_proj", "v_proj"]
  learning_rate: 1.0e-5
  batch_size: 1
  ppo_epochs: 30
  gradient_accumulation_steps: 1
  target_kl: 0.1
  reward_baseline: 0.0
  output_max_length: 128

reward_model:
  name: "Ray2333/gpt2-large-harmless-reward_model"

paths:
  output_dir: "./checkpoints"
  results_dir: "./results"